name: Claude Issue Helper (No Cost)

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')

    steps:
      - name: Generate Response
        id: response
        run: |
          TITLE="${{ github.event.issue.title }}"
          BODY="${{ github.event.issue.body }}"
          AUTHOR="${{ github.event.issue.user.login }}"

          # Simple response logic (no API cost)
          RESPONSE="Thanks for reaching out, @${AUTHOR}! 👋

          **Issue Summary:**
          - **Title:** ${TITLE}

          **Next Steps:**
          1. Review the issue description
          2. Check if this is a bug report, feature request, or question
          3. Add appropriate labels
          4. Assign to team members if needed

          *This is an automated response. A team member will review shortly.*"

          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.response.outputs.response }}`
            })
